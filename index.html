<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroEquilíbrio 2050 - Agro Forte e Sustentável</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #1b5e20; /* Verde Agro */
            --accent-color: #0d47a1; /* Azul Tecnologia */
            --text-color: #333333;
            --agua-color: #2196f3;
            --solo-color: #4caf50;
            --capital-color: #ffb300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cabeçalho */
        .game-header {
            background: linear-gradient(135deg, var(--primary-color), #2e7d32);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .game-header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .slogan {
            font-size: 1.1rem;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .badge {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Painel de Recursos */
        .resources-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .resource-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .resource-item label {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .progress-bar {
            background-color: #e0e0e0;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-in-out;
        }

        .progress-fill.agua { background-color: var(--agua-color); }
        .progress-fill.solo { background-color: var(--solo-color); }
        .progress-fill.capital { background-color: var(--capital-color); }

        .resource-item span {
            font-size: 0.85rem;
            align-self: flex-end;
            font-weight: bold;
        }

        /* Corpo Principal */
        .game-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .scenario-card, .oracle-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .scenario-card h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #scenario-climate {
            color: #c62828;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .image-container {
            width: 100%;
            height: 280px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #eee;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Oráculo e Perguntas */
        .oracle-card h3 {
            color: var(--accent-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #444;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-option {
            background-color: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            background-color: #e8f5e9;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        @media(max-width: 600px) {
            body { padding: 10px; }
            .game-header h1 { font-size: 1.6rem; }
            .image-container { height: 180px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>AgroEquilíbrio 2050</h1>
            <div class="slogan"><strong>🌿 Agro Forte, Futuro Sustentável: Equilíbrio entre Produção e Meio Ambiente</strong></div>
            <div class="score-board">
                <div class="badge">Nível: <span id="level-val">1</span></div>
                <div class="badge">Pontos: <span id="points-val">0</span></div>
            </div>
        </header>

        <section class="resources-panel">
            <div class="resource-item">
                <label>💧 Água Disponível</label>
                <div class="progress-bar">
                    <div id="bar-agua" class="progress-fill agua"></div>
                </div>
                <span id="txt-agua">70%</span>
            </div>

            <div class="resource-item">
                <label>🌱 Saúde do Solo</label>
                <div class="progress-bar">
                    <div id="bar-solo" class="progress-fill solo"></div>
                </div>
                <span id="txt-solo">65%</span>
            </div>

            <div class="resource-item">
                <label>💰 Capital Disponível</label>
                <div class="progress-bar">
                    <div id="bar-capital" class="progress-fill capital"></div>
                </div>
                <span id="txt-capital">80%</span>
            </div>
        </section>

        <main class="game-main">
            <div class="scenario-card">
                <h2 id="scenario-title">Carregando Missão...</h2>
                <p id="scenario-climate"><strong>Clima:</strong> Estável</p>
                <div class="image-container">
                    <img id="scenario-img" src="" alt="Cenário Agro">
                </div>
            </div>

            <div class="oracle-card" id="oracle-section">
                <h3>🔮 O Oráculo do Agro Forte</h3>
                <div id="question-container">
                    <p class="question-text" id="question-text">Carregando relatório técnico...</p>
                    <div class="options-container" id="options-container"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Estado inicial do jogo
        let gameState = {
            nivel: 1,
            pontos: 0,
            agua: 70,
            solo: 65,
            capital: 80,
            currentQuestionIndex: 0,
            isGameOver: false
        };

        // Banco de dados de perguntas - Foco em Agro Forte e Alta Tecnologia
        const perguntasAgroForte = [
            {
                titulo: "Agricultura de Precisão (IoT)",
                descricao: "Uma forte seca se aproxima. Para não desperdiçar recursos, você deseja investir em sensores de solo conectados e monitoramento por drones para aplicar água e nutrientes apenas onde é necessário?",
                imagem: "https://images.unsplash.com/photo-1560493450-b15b2c90f438?auto=format&fit=crop&w=800&q=80",
                opcoes: [
                    { 
                        texto: "Sim, investir em tecnologia de precisão. (Custo Alto, Economia de Recursos futuros)", 
                        efeito: { capital: -30, agua: +20, solo: +15, pontos: +25 } 
                    },
                    { 
                        texto: "Não, manter o manejo visual e manual tradicional para economizar capital.", 
                        efeito: { capital: 0, agua: -25, solo: -10, pontos: +5 } 
                    }
                ]
            },
            {
                titulo: "Biotecnologia na Safra",
                descricao: "É hora de escolher as sementes. O laboratório parceiro oferece uma nova variedade de sementes biotecnológicas com alta resistência ao estresse térmico e hídrico.",
                imagem: "https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?auto=format&fit=crop&w=800&q=80",
                opcoes: [
                    { 
                        texto: "Adotar sementes biotecnológicas de alta performance. (Garante alta produtividade)", 
                        efeito: { capital: -35, agua: +15, solo: +5, pontos: +30 } 
                    },
                    { 
                        texto: "Comprar sementes convencionais mais baratas.", 
                        efeito: { capital: +15, agua: -30, solo: -15, pontos: +10 } 
                    }
                ]
            },
            {
                titulo: "Armazenamento Inteligente",
                descricao: "Sua colheita automatizada foi recorde! Porém, o preço de venda atual de mercado está muito baixo. Qual a sua estratégia logística?",
                imagem: "https://images.unsplash.com/photo-1595275372297-f7d6437db97d?auto=format&fit=crop&w=800&q=80",
                opcoes: [
                    { 
                        texto: "Construir silos modernos com atmosfera controlada para estocar e vender na alta dos preços.", 
                        efeito: { capital: -35, agua: 0, solo: 0, pontos: +45 } // Ganhará bônus de retorno no código
                    },
                    { 
                        texto: "Vender imediatamente para atravessadores para recuperar dinheiro rápido.", 
                        efeito: { capital: +20, agua: -5, solo: 0, pontos: +15 } 
                    }
                ]
            },
            {
                titulo: "Defensivos Biológicos",
                descricao: "Sua equipe detectou focos de lagarta na plantação. Como o Agro Forte deve agir para combater a praga mantendo o solo saudável?",
                imagem: "https://images.unsplash.com/photo-1464241353293-0f4ec87ffd1c?auto=format&fit=crop&w=800&q=80",
                opcoes: [
                    { 
                        texto: "Utilizar manejo integrado com biodefensivos (inimigos naturais e microrganismos).", 
                        efeito: { capital: -20, agua: 0, solo: +20, pontos: +40 } 
                    },
                    { 
                        texto: "Aplicar pulverização química pesada tradicional padrão.", 
                        efeito: { capital: -5, agua: -15, solo: -25, pontos: +15 } 
                    }
                ]
            }
        ];

        // Atualiza a interface (HTML e Barras)
        function updateDOM() {
            // Impedir que os valores saiam da escala de 0 a 100
            gameState.agua = Math.max(0, Math.min(100, gameState.agua));
            gameState.solo = Math.max(0, Math.min(100, gameState.solo));
            gameState.capital = Math.max(0, Math.min(100, gameState.capital));

            // Atualizar os textos
            document.getElementById('level-val').innerText = gameState.nivel;
            document.getElementById('points-val').innerText = gameState.pontos;
            
            document.getElementById('txt-agua').innerText = gameState.agua + "%";
            document.getElementById('txt-solo').innerText = gameState.solo + "%";
            document.getElementById('txt-capital').innerText = gameState.capital + "%";

            // Atualizar o tamanho visual das barras
            document.getElementById('bar-agua').style.width = gameState.agua + "%";
            document.getElementById('bar-solo').style.width = gameState.solo + "%";
            document.getElementById('bar-capital').style.width = gameState.capital + "%";

            // Verificar condições de derrota (algum recurso chegou a zero)
            if (!gameState.isGameOver && (gameState.agua <= 0 || gameState.solo <= 0 || gameState.capital <= 0)) {
                endGame(false);
            }
        }

        // Carrega a pergunta atual na tela
        function loadQuestion() {
            if (gameState.isGameOver) return;

            if (gameState.currentQuestionIndex >= perguntasAgroForte.length) {
                endGame(true); // Fim das perguntas = Vitória por boa gestão
                return;
            }

            let perguntaAtual = perguntasAgroForte[gameState.currentQuestionIndex];
            
            // Atualiza cabeçalhos e imagens do cenário
            document.getElementById('scenario-title').innerText = `Decisão Estratégica: ${perguntaAtual.titulo}`;
            document.getElementById('scenario-img').src = perguntaAtual.imagem;
            document.getElementById('question-text').innerText = perguntaAtual.descricao;

            // Renderiza as opções de botões
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = "";

            perguntaAtual.opcoes.forEach((opcao) => {
                let btn = document.createElement('button');
                btn.className = "btn-option";
                btn.innerText = opacityText = opcao.texto;
                btn.onclick = () => handleChoice(opcao.efeito);
                optionsContainer.appendChild(btn);
            });
        }

        // Processa a escolha selecionada pelo jogador
        function handleChoice(efeito) {
            if (gameState.isGameOver) return;

            // Aplica os impactos nos recursos
            gameState.agua += efeito.agua;
            gameState.solo += efeito.solo;
            gameState.capital += efeito.capital;
            gameState.pontos += efeito.pontos;

            // Evento dinâmico: Se construiu o silo na Q3 (índice 2), recebe retorno financeiro alto logo em seguida
            if (gameState.currentQuestionIndex === 2 && efeito.pontos === 45) {
                gameState.capital += 55; // Recompensa por vender na época certa
            }

            // Avança o índice da pergunta
            gameState.currentQuestionIndex++;
            
            // Mudança dinâmica de clima/nível no meio do jogo
            if (gameState.currentQuestionIndex === 2) {
                gameState.nivel = 2;
                document.getElementById('scenario-climate').innerHTML = "<strong>Clima:</strong> Estabilizado por Tecnologias Predictivas";
            }

            updateDOM();
            loadQuestion();
        }

        // Finaliza o jogo mostrando tela de Vitória ou Derrota
        function endGame(isVictory) {
            gameState.isGameOver = true;
            const oracleSection = document.getElementById('oracle-section');
            
            if (isVictory) {
                document.getElementById('scenario-title').innerText = "🏆 Vitória! Fazenda Potência do Futuro";
                document.getElementById('question-text').innerText = `Parabéns! Você aplicou o conceito de Agro Forte com maestria. Sua lavoura alcançou recordes de produtividade usando biotecnologia e automação, preservando totalmente o meio ambiente. Pontuação Final: ${gameState.pontos} pontos!`;
                document.getElementById('scenario-img').src = "https://images.unsplash.com/photo-1592417817098-8f3d6eb19675?auto=format&fit=crop&w=800&q=80";
                oracleSection.innerHTML = "<h3>Missão Cumprida</h3><p style='text-align:center; font-weight:bold; color:var(--primary-color);'>Seu modelo de gestão provou que alta produção caminha de mãos dadas com a sustentabilidade!</p>";
            } else {
                document.getElementById('scenario-title').innerText = "❌ Colapso na Produção";
                document.getElementById('question-text').innerText = "Sua propriedade esgotou um dos recursos vitais. Lembre-se: no Agro Forte, a falta de tecnologia de conservação ou falhas no caixa geram crises severas. O equilíbrio técnico é a chave.";
                document.getElementById('scenario-img').src = "https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=800&q=80";
                oracleSection.innerHTML = "<h3>Fim de Jogo</h3><button onclick='window.location.reload()' class='btn-option' style='text-align:center; width:100%; border-color:#c62828;'>Recomeçar Simulação</button>";
            }
        }

        // Inicia o sistema
        window.onload = () => {
            updateDOM();
            loadQuestion();
        };
    </script>
</body>
</html>
